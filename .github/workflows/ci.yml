name: Playwright Tests
on:
  push:
    branches:
      - master
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Update snapshots
        run: npx playwright test QA21visual.spec.js --project=chromium --update-snapshots
      - name: Run tests
        run: npx playwright test --project=chromium --ignore=browsertests/js-tests/insure.spec.js --ignore=browsertests/js-tests/QA13search.spec.js